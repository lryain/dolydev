# Fan configuration (YAML format) - converted from fan_config.txt

# PWM test sequence (用于测试/校准)
pwm_values:
  - 0
  - 3000
  - 3100
  - 3200
  - 3300
  - 3400
  - 3500
  - 3600
  - 3650
  - 3700
  - 3750
  - 3850
  - 3900
  - 3950
  - 4000
  - 4050
  - 4055
  - 4060
  - 4065
  - 4070
  - 4075
  - 4080

# Temperature control config
cold_start_duration_sec: 5
fan_start_temp: 50
fan_stop_temp: 40
pwm_min: 3800
pwm_max: 4060
temp_min: 40
temp_max: 70

# 当温度在检测窗口内没有下降时，是否强制全速（1=启用, 0=禁用）
force_on_stagnation: 0
# 强制最大 PWM 的最长持续时间（秒）。达到后回到正常控制。
force_duration_sec: 30
# 检测温度是否停滞的间隔（秒），默认 10
stagnation_check_interval_sec: 10
# 停滞判断使用的温度下降阈值（小于该值视为未明显下降），浮点
stagnation_temp_drop_threshold: 0.2
# 强制结束后再次触发强制的冷却时间（秒）
stagnation_force_cooldown_sec: 60

# 日志开关：1=启用日志打印（默认会输出运行日志），0=禁用（默认 0）
enable_logging: 0

# 是否将当前风扇转速（PWM 值）通过 ZMQ 发布到消息总线（1=发布，0=不发布）
publish_fan_speed: 0
# 发布频率（秒），当 publish_fan_speed=1 时生效，默认每 5 秒发布一次
publish_fan_speed_interval_sec: 5

# Mode-specific PWM ranges
mode_quiet_pwm_min: 0
mode_quiet_pwm_max: 1000
mode_normal_pwm_min: 1000
mode_normal_pwm_max: 3095
mode_performance_pwm_min: 3395
mode_performance_pwm_max: 4060

# RGB LED Max 255 Min 0 (保留配置，服务不直接使用)
rgb_left: [1, 1, 1]
rgb_right: [1, 1, 1]

# 新增：是否启用 ZMQ 功能 (1=启用, 0=禁用)
enable_zmq: 0
