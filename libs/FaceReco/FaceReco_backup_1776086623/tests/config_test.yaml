system:
  resolution_width: 1280
  resolution_height: 720
  frame_rate: 30
  input_source: rtsp_stream

modules:
  enable_face_detection: true
  enable_gesture_recognition: false
  enable_object_detection: true
  face_detection_threshold: 0.7
  motion_threshold: 0.25

performance:
  max_threads: 8
  max_memory_mb: 800
  target_fps: 20

logging:
  enable_logging: true
  log_level: DEBUG
  log_file: /var/log/livefacereco.log
