[system]
resolution_width = 640
resolution_height = 480
frame_rate = 15
input_source = camera

[modules]
enable_face_detection = true
enable_motion_detection = true
enable_light_detection = true
face_detection_threshold = 0.5
motion_threshold = 0.3

[performance]
max_threads = 4
max_memory_mb = 500
target_fps = 10

[logging]
enable_logging = true
log_level = INFO
log_file = /tmp/livefacereco.log
