# Camera capture parameters
# 使用摄像头支持的标准分辨率 320x240 (QVGA)
# 代码会自动 resize 到处理分辨率
cap_frame_width=320
cap_frame_height=240
cap_fps=15

# Descriptor cache (performance): when enabled the app will load precomputed
# face descriptors from disk at startup if the file exists. If the cache file
# is missing it will be created after descriptors are computed.
enable_descriptor_cache=true
# Whether a stable unknown face should be auto-registered after enough detections.
# false 时仅发布新脸事件并按陌生人处理；true 时自动写入 img/ 与 face_db.json。
auto_register_new_face=false
# Path to the descriptor cache file (YAML). Defaults to project path.
descriptor_cache_path=/home/pi/dolydev/libs/FaceReco/descriptors.yml

# Video stream parameters for EyeEngine integration（固定硬件路径类配置保留在 INI）
enable_video_stream_to_eyeengine=true
video_stream_target_lcd=1

# Vision service bus + runtime settings
# ★ NOTE: pub_endpoint 和 sub_endpoint 必须不同
# pub_endpoint: Vision Service 发布事件的端点（BIND）
# sub_endpoint: 连接到 Daemon 的全局事件总线来接收命令（CONNECT）
vision_face_db_path=/home/pi/dolydev/libs/FaceReco/data/face_db.json
vision_photo_path=/home/pi/dolydev/libs/FaceReco/captures
vision_video_path=/home/pi/dolydev/libs/FaceReco/videos

# Capture settings
# 是否需要检测到人脸才能拍照（false=任意时候都可以拍照）
capture_require_face=false
# 拍照后在eyeEngine显示照片的持续时间（秒），0=不显示
capture_display_duration=3.0
# 显示照片的LCD（0=左眼，1=右眼）
capture_display_lcd=1
