# 传感器事件映射配置
# 定义不同传感器事件在各个state下的响应行为
# 支持gesture/pattern级别的细粒度处理，而非简单的原始pin事件

# ===== 传感器类型全局开关 =====
# 用于调试: 可以分别启用/禁用各种传感器事件
sensor_types:
  touch:
    enabled: true
  cliff:
    enabled: true
  tof:
    enabled: true
  imu:
    enabled: false
  battery:
    enabled: false

sensor_events:
  
  # ===== 触摸传感器事件 =====
  # touch.gesture 事件由drive服务识别出的高级手势事件
  
  touch_left_single_tap:
    # 左侧单击/短按 -> 随机眨眼
    states:
      IDLE:
        action:
          type: play_animation
          animation: annoy2.xml
        cooldown: 1.0  # 1秒冷却时间（卡尔曼滤波）
        priority: normal
      ACTIVATED:
        action:
          type: play_animation
          animation: annoy1_l.xml
        priority: normal
      EXPLORING:
        action:
          type: play_animation
          animation: annoy1_l.xml
        priority: normal
      ANY:
        action:
          type: play_animation
          animation: annoy2.xml
        cooldown: 1.0
        priority: normal
  
  touch_left_multiple_taps:
    # 左侧连续短按 -> 随机annoy分类动画
    states:
      IDLE:
        action:
          type: play_animation
          animation: annoy1_l.xml
          level: 1
        cooldown: 2.0
        priority: normal
      EXPLORING:
        action:
          type: play_animation
          animation: annoy1_r.xml
        priority: high
      ANY:
        action:
          type: play_animation
          animation: annoy1_l.xml
          level: 1
        cooldown: 1.0
        priority: normal
  
  touch_left_long_press:
    # 左侧长按 -> petting1.xml
    states:
      IDLE:
        action:
          type: play_animation
          animation: petting1.xml
        priority: normal
      ACTIVATED:
        action:
          type: play_animation
          animation: petting2.xml
        priority: normal
      ANY:
        action:
          type: play_animation
          animation: petting1.xml
        cooldown: 1.5
        priority: normal
  
  touch_left_long_press_2x:
    # 左侧2次长按 -> petting2.xml
    states:
      IDLE:
        action:
          type: play_animation
          animation: petting2.xml
        priority: normal
      ACTIVATED:
        action:
          type: play_animation
          animation: petting2.xml
        priority: high
      ANY:
        action:
          type: play_animation
          animation: petting2.xml
        cooldown: 1.5
        priority: normal
  
  touch_left_long_press_3x:
    # 左侧3次长按 -> petting3.xml
    states:
      IDLE:
        action:
          type: play_animation
          animation: petting3.xml
        priority: normal
      ANY:
        action:
          type: play_animation
          animation: petting3.xml
        cooldown: 1.5
        priority: normal
  
  touch_left_double_tap:
    # 左侧双击 -> confuse.xml
    states:
      IDLE:
        action:
          type: play_animation
          animation: angry2_1.xml
        priority: normal
      ACTIVATED:
        action:
          type: play_animation
          animation: angry2_2.xml
        priority: normal
      ANY:
        action:
          type: play_animation
          animation: angry2_3.xml
        cooldown: 1.0
        priority: normal
  
  # 右侧触摸事件（类似左侧处理）
  touch_right_single_tap:
    states:
      IDLE:
        action:
          type: play_animation
          animation: annoy1_l.xml
        cooldown: 1.0
        priority: normal
      ANY:
        action:
          type: play_animation
          animation: annoy1_l.xml
        cooldown: 1.0
        priority: normal
  
  touch_right_multiple_taps:
    # 右侧连续短按 -> 随机annoy分类动画
    states:
      IDLE:
        action:
          type: play_animation
          animation: annoy1_r.xml
          level: 1
        cooldown: 2.0
        priority: normal
      EXPLORING:
        action:
          type: play_animation
          animation: annoy1_r.xml
        priority: high
      ANY:
        action:
          type: play_animation
          animation: annoy1_r.xml
          level: 1
        cooldown: 3.0
        priority: normal
  
  touch_right_long_press:
    # 右侧长按 -> petting3.xml
    states:
      IDLE:
        action:
          type: play_animation
          animation: petting3.xml
        priority: normal
      ACTIVATED:
        action:
          type: play_animation
          animation: petting2.xml
        priority: normal
      ANY:
        action:
          type: play_animation
          animation: petting3.xml
        cooldown: 1.5
        priority: normal
  
  touch_right_long_press_2x:
    # 右侧2次长按 -> petting2.xml
    states:
      IDLE:
        action:
          type: play_animation
          animation: petting2.xml
        priority: normal
      ACTIVATED:
        action:
          type: play_animation
          animation: petting2.xml
        priority: high
      ANY:
        action:
          type: play_animation
          animation: petting2.xml
        cooldown: 1.5
        priority: normal
  
  touch_right_long_press_3x:
    # 右侧3次长按 -> petting3.xml
    states:
      IDLE:
        action:
          type: play_animation
          animation: petting3.xml
        priority: normal
      ANY:
        action:
          type: play_animation
          animation: petting3.xml
        cooldown: 1.5
        priority: normal
  
  touch_right_double_tap:
    # 右侧双击 -> angry/confused动画
    states:
      IDLE:
        action:
          type: play_animation
          animation: angry2_1.xml
        priority: normal
      ACTIVATED:
        action:
          type: play_animation
          animation: angry2_2.xml
        priority: normal
      ANY:
        action:
          type: play_animation
          animation: angry2_3.xml
        cooldown: 1.0
        priority: normal
  
  # ===== 悬崖传感器事件（最高优先级，所有state都要响应）=====
  # cliff.detected 事件必须立即响应，中断当前操作避让悬崖
  
  cliff_front_left:
    # IRS_FL 前左悬崖 -> edge_l.xml（向右转避开）
    states:
      # 所有状态都必须响应
      ANY:
        action:
          type: play_animation
          animation: edge_fl.xml
        priority: critical  # 最高优先级
        interrupt: true     # 中断当前动画
        cooldown: 3.0     # 3秒内同一传感器事件不重复触发
  
  cliff_front_right:
    # IRS_FR 前右悬崖 -> edge_r.xml（向左转避开）
    states:
      ANY:
        action:
          type: play_animation
          animation: edge_fr.xml
        priority: critical
        interrupt: true
        cooldown: 3.0
  
  cliff_back_left:
    # IRS_BL 后左悬崖 -> edge_fb.xml（后退并转向）
    states:
      ANY:
        action:
          type: play_animation
          animation: edge_bl.xml
        priority: critical
        interrupt: true
        cooldown: 3.0
  
  cliff_back_right:
    # IRS_BR 后右悬崖 -> edge_fb.xml（后退并转向）
    states:
      ANY:
        action:
          type: play_animation
          animation: edge_br.xml
        priority: critical
        interrupt: true
        cooldown: 3.0


# ===== 未来扩展 =====
# IMU传感器（倾斜、震动）
# TOF传感器（距离）
# 电量传感器事件
# 其他传感器

# ===== 配置说明 =====
# - states: 定义在不同state下的行为，支持:
#   - IDLE: 空闲状态
#   - ACTIVATED: 激活状态
#   - EXPLORING: 探索状态
#   - SLEEPING: 睡眠状态
#   - BLOCKLY: Blockly执行状态
#   - ANY: 任何状态（用于紧急事件）
#
# - action: 执行的动作类型
#   - play_animation: 播放单个动画
#   - play_animation_category: 播放指定分类的动画
#   - direct_command: 执行直接命令
#   - interrupt_and_play: 中断当前播放指定动画
#
# - priority: 优先级
#   - critical: 最高（紧急事件，如悬崖）
#   - high: 高
#   - normal: 普通
#
# - cooldown: 冷却时间（秒），短时间内重复事件会合并
# - interrupt: 是否中断当前动画/动作
