# 电机控制配置文件
# 用于配置电机方向等硬件相关参数

[motor]
# 电机方向配置
# 由于硬件接线可能导致电机方向反转，通过此配置矫正
# left_reverse: 左电机是否反转 (true/false)
# right_reverse: 右电机是否反转 (true/false)
left_reverse = false
right_reverse = true

# PWM配置 不要设置 要和舵机的50Hz一致，不然舵机会混乱
; pwm_frequency = 50
pwm_resolution = 4096

# 缓启动时间（秒）: 在调用 setSpeeds 时线性从当前速度过渡到目标速度的耗时
# 可以用命令行 --ramp-time 覆盖（优先于此配置）
ramp_time = 0.3

# PWM补偿值：用于补偿不同批次电机的最小PWM值差异
# 范围：0.0~1.0，默认值为1.0（不补偿）
# 用法：如果某个电机需要更高的PWM才能驱动，增大此值；如果需要较低的PWM，减小此值
# 例如：left_pwm_compensation = 0.95 表示左电机PWM值乘以0.95
# 实际PWM值 = speedToPWM(speed) * pwm_compensation
left_pwm_compensation = 1.2
right_pwm_compensation = 1.2

# 电机通道配置
left_in1_channel = 12
left_in2_channel = 13
right_in1_channel = 14
right_in2_channel = 15

# 编码器 GPIO 引脚配置，按照 EncoderReader 的 (A, B) 顺序
left_encoder_a = 6
left_encoder_b = 24
right_encoder_a = 0
right_encoder_b = 27

[encoder]
enable_encoder = true 
# ===== 编码器参数配置 (M2 阶段) =====
# 基础参数
# 注：根据实测，真实PPR远大于12，可能是12×100或更多
# 目标：2cm运动产生130脉冲，那么cm_per_pulse = 2/130 = 0.0154
# 倒推：轮周9.4248cm / PPR = 0.0154，PPR = 9.4248/0.0154 = ~612
# 但为了调试，先用临时值，后续通过标定确定
pulses_per_revolution = 1200               # 临时设置（待实测标定）

# 物理参数
wheel_diameter_cm = 3.0                   # 轮子直径（单位：cm）
wheel_circumference_cm = 9.4248           # 轮子周长 = π × 直径（计算值）
cm_per_pulse = 0.0157                     # 临时计算值：9.4248 / 600 （后续调整）

# 运动学参数
axle_width_cm = 8.0                      # 轮距（左右轮中心距离 = 4cm × 2）

# 速度映射（脉冲率，pulse/sec）
# 根据 throttle 值（0.0~1.0）计算期望的脉冲率
pulse_rate_at_020 = 3.0                   # throttle=0.2 时
pulse_rate_at_040 = 6.0                   # throttle=0.4 时
pulse_rate_at_060 = 9.0                   # throttle=0.6 时
pulse_rate_at_080 = 12.0                  # throttle=0.8 时
pulse_rate_at_100 = 15.0                  # throttle=1.0 时

# 转向补偿参数（通过实测标定）
turn_compensation_factor = 1.1             # 转向脉冲差补偿因子（默认1.0，实测后调整）
turn_cw_offset_deg = 0.0                   # 顺时针偏差补正（度数）
turn_ccw_offset_deg = 0.0                  # 逆时针偏差补正（度数）

# ===== PID 位置控制总开关 =====
[pid_control]
# 全局 PID 控制开关：true=启用 PID，false=使用普通速度控制
enable_pid = true                        # ⚙️ PID 总开关 (false=禁用, true=启用)

[pid_position]
# ===== PID 位置控制参数 =====
# 说明：当 [pid_control] 中 enable_pid=true 时启用此参数
# 
# PID 三参数说明：
#   Kp (比例增益)：对误差的响应强度，值越大收敛越快但易振荡
#   Ki (积分增益)：消除稳态误差，值太大会导致超调
#   Kd (微分增益)：阻尼效果，防止振荡，值太大会产生反向控制
#
# 推荐初始值：Kp=0.3, Ki=0.05, Kd=0.02

position_kp = 0.20                         # P 项增益（推荐：0.2~0.5）
position_ki = 0.01                         # I 项增益（推荐：0.01~0.1）
position_kd = 0.01                         # D 项增益（推荐：0.01~0.05）

# 积分限制：防止积分项爆炸
position_ki_limit = 15.0                   # 积分累积上限（推荐：10~30）

# 输出限制（百分比，对应 PWM 0.1~1.0）
# 注：输出范围应 >= PWM 死区，通常设为 [10%, 100%]
position_output_min = 10                 # 最小输出百分比（对应 PWM=0.1）
position_output_max = 100.0                # 最大输出百分比（对应 PWM=1.0）

# ===== 电机 PWM 死区参数 =====
# 说明：硬件限制，低于此 PWM 值的信号无法驱动电机
pwm_deadzone = 0.1                         # 死区下限（实测：0.08~0.12）
pwm_min_active = 0.1                       # 最小有效 PWM（应等于死区）
pwm_max = 1.0                              # 最大 PWM 值（标准：1.0）

# ===== PID 控制周期 =====
position_control_period_ms = 50            # 每 50ms 更新一次 PID（推荐：50ms）

# ===== 调试选项 =====
debug_encoder = false                      # 输出编码器详细日志 (true/false)
debug_pulses = true                        # 输出脉冲计算日志 (true/false)

# ===== 运动容差参数 =====
position_tolerance = 50                     # 直线运动误差容限（脉冲数）
angle_tolerance_deg = 2.0                  # 转向运动误差容限（度数）
overshoot_tolerance_percent = 30           # 防过头容忍度（%）

# ===== 运动超时设置 =====
move_default_timeout_ms = 10000            # 直线运动超时（ms）
turn_default_timeout_ms = 8000             # 转向运动超时（ms）

[balance]
left_scaler = 1.148
; left_scaler = 1.0000
right_scaler = 1.0000
